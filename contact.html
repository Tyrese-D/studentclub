<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    background-color:#f4f4f4;
}
.nav{
    background-color:#333333;
    padding:15px;
    text-align:center;
}
.nav a{
    color:#FFFFFF;
    text-decoration:none;
    margin:0 12px;
    font-weight:bold;
}
.nav a:hover{
    color:#FFCCCC;
}
.hero{
    background-color:#CC0033;
    color:#FFFFFF;
    padding:50px 40px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}
.hero-logo{
    position:absolute;
    left:40px;
    top:50%;
    transform:translateY(-50%);
}
.hero-logo img{
    height:120px;
    width:auto;
    border:3px solid #111111;
    border-radius:6px;
}
.hero-text{
    text-align:center;
}
.container{
    width:90%;
    max-width:1100px;
    margin:25px auto;
}
.card{
    background-color:#FFFFFF;
    border-radius:20px;
    padding:20px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    margin-bottom:20px;
}
.btn{
    background-color:#0E5061;
    color:#FFFFFF;
    padding:10px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.btn:hover{
    background-color:#2F6678;
}
table{
    width:100%;
    border-collapse:collapse;
    background-color:#FFFFFF;
}
th, td{
    padding:12px;
    text-align:left;
    border:1px solid #cccccc;
}
th{
    background:#333333;
    color:white;
}
tr:nth-child(even){
    background:#f2f2fe;
}
tr:nth-child(odd){
    background:#FFFFFF;
}
tr:hover{
    background:#d1ecf1;
}
input[type="text"], input[type="password"], input[type="email"], textarea{
    width:100%;
    border:1px solid #333;
    box-sizing:border-box;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
}
textarea{
    height:150px;
}
p > label{
    display:block;
}
.footer{
    background-color:#333333;
    color:#FFFFFF;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
.footer a{
    color:#FFFFFF;
    text-decoration:none;
}
.announcement{
    background-color:#FFFFFF;
    border-left:6px solid #CC0033;
    padding:15px;
    margin-bottom:15px;
}
.event-box{
    background-color:#FFFFFF;
    border-radius:20px;
    padding:20px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    margin-bottom:20px;
}
.info-box{
    background-color:#FFFFFF;
    border-radius:20px;
    padding:20px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    margin-bottom:15px;
}
#loginBox{
    display:none;
}

</style>
<script>
function submitMessage() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let ruid = document.getElementById("ruid").value;
    let message = document.getElementById("message").value;

    if(name == "" || email == "" || ruid == "" || message == "") {
        alert("Please fill out all required fields.");
    } else {
        alert("Your message has been submitted.");
    }
}
</script>
</head>
<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="events.html">Events</a>
    <a href="members.html">Members</a>
    <a href="announcements.html">Announcements</a>
    <a href="contact.html">Contact</a>
</div>

<div class="hero">
    <div class="hero-logo">
        <img src="Rut logo.png" alt="Rutgers Newark Logo">
    </div>
    <div class="hero-text">
        <h1>Contact Us!</h1>
        <p>If you have any questions, please feel free to send us a message.</p>
    </div>
</div>

<div class="container">
    <div class="card">
        <p><label>Name*</label>
        <input type="text" id="name" placeholder="Name"></p>

        <p><label>Email*</label>
        <input type="email" id="email" placeholder="Email"></p>

        <p><label>RUID*</label>
        <input type="text" id="ruid" placeholder="RUID"></p>

        <p><label>Write Your Message*</label>
        <textarea id="message" placeholder="Write Your Message"></textarea></p>

        <p><input class="btn" type="button" value="Submit" onclick="submitMessage()"></p>
    </div>

    <div class="info-box">
        <h2>Phone</h2>
        <p>(XXX) XXX-XXXX</p>
    </div>

    <div class="info-box">
        <h2>Email</h2>
        <p>xxxxx@rutgers.business.edu</p>
    </div>

    <div class="info-box">
        <h2>Address</h2>
        <p>1 Washington Pl, Newark, NJ, 07102</p>
    </div>
</div>

<div class="footer">
    <p>Club Resources</p>
    <a href="index.html">Home</a> |
    <a href="events.html">Events</a> |
    <a href="members.html">Members</a> |
    <a href="contact.html">Contact</a>
</div>

</body>
</html>
